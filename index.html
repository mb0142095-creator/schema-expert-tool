<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>SchemaExpertify Dashboard</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="app-header">
        <div class="app-logo">
          <span class="logo-mark">SC</span>
          <span class="logo-text">SchemaExpertify</span>
        </div>
        <div class="app-header-actions">
          <button class="ghost-button" id="docs-btn">Docs</button>
          <button class="primary-button" id="export-btn">Export JSON-LD</button>
        </div>
      </header>

      <main class="app-main">
        <!-- Column 1: Schema Types -->
        <section class="panel panel-sidebar">
          <header class="panel-header">
            <h2>Schema Types</h2>
          </header>
          <div class="panel-body schema-list" id="schema-list">
            <!-- Populated via JavaScript -->
          </div>
        </section>

        <!-- Column 2: Schema Form -->
        <section class="panel panel-form">
          <header class="panel-header">
            <div>
              <h2 id="schema-title">Article</h2>
              <p class="panel-subtitle" id="schema-description">
                Configure the fields for your Article structured data.
              </p>
            </div>
            <div class="schema-meta">
              <span class="schema-badge" id="schema-context-badge">@context: https://schema.org</span>
            </div>
          </header>
          <div class="panel-body form-body">
            <form id="schema-form" class="schema-form">
              <!-- Populated via JavaScript -->
            </form>
          </div>
        </section>

        <!-- Column 3: JSON-LD Code Preview -->
        <section class="panel panel-code">
          <header class="panel-header">
            <div>
              <h2>JSON-LD Preview</h2>
              <p class="panel-subtitle">Live, copy-ready structured data.</p>
            </div>
            <div class="code-header-actions">
              <span class="pill pill-success">Valid</span>
              <button class="ghost-button ghost-button-sm" id="copy-btn">
                Copy
              </button>
            </div>
          </header>
          <div class="panel-body code-body">
            <div class="code-editor-chrome">
              <div class="code-chrome-dots">
                <span></span><span></span><span></span>
              </div>
              <div class="code-chrome-meta">
                <span>schema.jsonld</span>
              </div>
            </div>
            <pre class="code-editor" id="code-editor">
<code class="language-json" id="schema-json-id"></code>
            </pre>
          </div>
        </section>
      </main>
    </div>

    <script src="./script.js"></script>
  </body>
</html>
